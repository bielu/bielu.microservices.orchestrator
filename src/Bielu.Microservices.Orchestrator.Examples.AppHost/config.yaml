receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  otlp/aspire:
    endpoint: http://aspire-dashboard:18889
    tls:
      insecure: true

extensions:
  health_check:

service:
  extensions: [health_check]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/aspire]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/aspire]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/aspire]